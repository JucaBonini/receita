<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Você está offline - Descomplicando Receitas</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8f6f6; color: #333; text-align: center; }
        .container { padding: 40px; background: white; border-radius: 40px; shadow: 0 20px 50px rgba(0,0,0,0.05); max-width: 400px; }
        .icon { font-size: 80px; color: #ec5b13; margin-bottom: 20px; }
        h1 { margin: 0 0 10px; font-weight: 900; letter-spacing: -1px; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; background: #ec5b13; color: white; padding: 15px 30px; border-radius: 20px; text-decoration: none; font-weight: bold; transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🍳</div>
        <h1>Sem internet no momento?</h1>
        <p>Parece que você está sem conexão. Mas não se preocupe, suas receitas favoritas estão sendo salvas no seu dispositivo!</p>
        <a href="javascript:window.location.reload();" class="btn">TENTAR NOVAMENTE</a>
    </div>
</body>
</html>
